name: bachkhoa-erp-dev

services:
  redis-contracts:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./dev/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      - uvicorn
      - src.index:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --reload
    env_file:
      - ./dev/backend/.env
    environment:
      REDIS_URL: redis://redis-contracts:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./dev/backend/src:/app/src
      - ./dev/backend/static:/app/static
    depends_on:
      redis-contracts:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./dev/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_BACKEND_TARGET: http://backend:8080
      VITE_USE_POLLING: "true"
    ports:
      - "127.0.0.1:3000:5173"
    volumes:
      - ./dev/frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend-node-modules:
