name: bachkhoa-erp

services:
  redis-contracts:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./dev/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./dev/backend/.env
    environment:
      REDIS_URL: redis://redis-contracts:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wiki-files
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - contract-files:/app/static/contracts
    depends_on:
      redis-contracts:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./dev/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  contract-files:
